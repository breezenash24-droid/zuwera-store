<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Page Builder — Zuwera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Barlow:wght@400;500;600&family=Barlow+Condensed:ital,wght@1,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0f0f11;color:#f4f1eb;font-family:'Barlow',sans-serif;font-size:13px}
:root{
  --bg:#0f0f11;--surface:#17171b;--surface2:#1e1e24;--border:rgba(255,255,255,.08);
  --muted:rgba(244,241,235,.42);--accent:#F891A5;
}
/* Layout */
body{display:flex;flex-direction:column}
.topbar{height:46px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem;padding:0 1rem;flex-shrink:0;z-index:50}
.tlogo{font-family:'Barlow Condensed',sans-serif;font-style:italic;font-weight:900;font-size:1.15rem;color:#f4f1eb;text-decoration:none}
.tsep{width:1px;height:18px;background:var(--border)}
.ttitle{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);flex:1}
.tbtn{border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:.38rem .85rem;border-radius:2px;transition:.15s}
.tbtn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.tbtn-ghost:hover{border-color:rgba(255,255,255,.25);color:#f4f1eb}
.tbtn-solid{background:#f4f1eb;color:#0f0f11;font-weight:600}
.tbtn-solid:hover{opacity:.88}
.tog{display:flex;gap:1px;background:var(--surface2);padding:2px;border-radius:3px}
.tog button{background:none;border:none;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;padding:.25rem .6rem;cursor:pointer;border-radius:2px;transition:.14s}
.tog button.on{background:var(--surface);color:#f4f1eb;box-shadow:0 1px 3px rgba(0,0,0,.4)}
#tstatus{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.1em;color:var(--muted)}

.layout{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sb{width:250px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sb-hd{padding:.6rem .85rem .5rem;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between}
.sec-list{flex:1;overflow-y:auto;padding:.35rem}
.sec-item{display:flex;align-items:center;gap:.45rem;padding:.45rem .55rem;border-radius:3px;cursor:pointer;transition:background .12s;border:1px solid transparent;margin-bottom:2px;user-select:none}
.sec-item:hover{background:var(--surface2)}
.sec-item.sel{background:var(--surface2);border-color:var(--accent)}
.sec-item.drag-over{border-color:var(--accent)}
.drag-h{color:var(--muted);cursor:grab;font-size:.7rem;opacity:.4;flex-shrink:0}
.drag-h:active{cursor:grabbing}
.sec-ico{font-size:.8rem;width:18px;text-align:center;flex-shrink:0}
.sec-nm{flex:1;font-size:.7rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sec-tp{font-family:'IBM Plex Mono',monospace;font-size:.48rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.vis-btn{background:none;border:none;cursor:pointer;font-size:.72rem;color:#f4f1eb;opacity:.45;transition:.12s;padding:0;line-height:1;flex-shrink:0}
.vis-btn:hover{opacity:1}
.vis-btn.off{opacity:.2}
.sb-ft{padding:.6rem .85rem;border-top:1px solid var(--border)}
.add-btn{width:100%;background:transparent;border:1px dashed rgba(255,255,255,.14);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;padding:.5rem;cursor:pointer;border-radius:2px;transition:.14s}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Editor */
.ed{width:300px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
.ed.hidden{width:0;border-right:none;overflow:hidden}
.ed-hd{padding:.6rem .85rem .5rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:.5rem;flex-shrink:0}
.ed-tp{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.ed-nm{font-size:.72rem;font-weight:600;letter-spacing:.03em}
.ed-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;line-height:1;padding:0;margin-left:auto;flex-shrink:0;transition:.12s}
.ed-x:hover{color:#f4f1eb}
.ed-body{flex:1;overflow-y:auto;padding:.75rem .85rem;display:flex;flex-direction:column;gap:.75rem}
.field{display:flex;flex-direction:column;gap:.28rem}
.field label,.fl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.field input,.field textarea,.field select{background:var(--surface2);border:1px solid var(--border);color:#f4f1eb;font-family:'Barlow',sans-serif;font-size:.75rem;padding:.4rem .55rem;outline:none;transition:border-color .14s;border-radius:2px;width:100%}
.field input:focus,.field textarea:focus{border-color:rgba(255,255,255,.28)}
.field textarea{resize:vertical;min-height:60px;line-height:1.5}
.fdiv{height:1px;background:var(--border);margin:.1rem 0}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:.45rem}
.tog2{display:flex;align-items:center;justify-content:space-between}
.tog2 label{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.switch{position:relative;width:32px;height:17px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0;position:absolute}
.sw-sl{position:absolute;inset:0;background:var(--surface2);border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:.15s}
.sw-sl::before{content:'';position:absolute;width:11px;height:11px;left:2px;top:2px;background:var(--muted);border-radius:50%;transition:.15s}
.switch input:checked+.sw-sl{background:var(--accent);border-color:var(--accent)}
.switch input:checked+.sw-sl::before{transform:translateX(15px);background:#fff}
.fhint{font-size:.6rem;color:var(--muted);line-height:1.5}
.fgroup{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:.6rem;display:flex;flex-direction:column;gap:.45rem}
.fgroup-lbl{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.1rem}
.del-sec{background:transparent;border:1px solid rgba(224,112,96,.25);color:rgba(224,112,96,.6);font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;padding:.4rem .7rem;cursor:pointer;width:100%;border-radius:2px;transition:.14s;margin-top:.3rem}
.del-sec:hover{border-color:rgba(224,112,96,.7);color:rgba(224,112,96,.9)}

/* Preview */
.pv{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0a0a0a}
.pv-bar{padding:.35rem .85rem;background:var(--surface);border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.1em;color:var(--muted);display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.pv-bar span{margin-left:auto}
.pv-wrap{flex:1;overflow:hidden;display:flex;align-items:flex-start;justify-content:center;padding:.85rem;background:repeating-linear-gradient(45deg,#0d0d0d 0,#0d0d0d 10px,#0a0a0a 10px,#0a0a0a 20px)}
.pv-frame{background:#fff;box-shadow:0 8px 40px rgba(0,0,0,.7);overflow:hidden;transition:all .25s;flex-shrink:0}
.pv-frame.desk{width:100%;height:calc(100vh - 46px - 40px - 1.7rem);border-radius:4px;max-width:1280px}
.pv-frame.mob{width:390px;height:calc(100vh - 46px - 40px - 1.7rem);max-height:820px;border-radius:14px}
.pv-frame iframe{width:100%;height:100%;border:none;display:block}

/* Library modal */
.mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.mover.open{display:flex}
.mbox{background:var(--surface);border:1px solid var(--border);width:min(580px,92vw);max-height:78vh;overflow-y:auto;border-radius:5px;box-shadow:0 16px 50px rgba(0,0,0,.5)}
.mbox-hd{padding:.8rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mbox-hd h3{font-size:.78rem;font-weight:600;letter-spacing:.05em}
.mx{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;line-height:1}
.mbox-body{padding:.85rem;display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem}
.sc{background:var(--surface2);border:1px solid var(--border);padding:.85rem .7rem;border-radius:3px;cursor:pointer;text-align:center;transition:.14s}
.sc:hover{border-color:var(--accent);background:rgba(248,145,165,.05)}
.sc-ico{font-size:1.35rem;margin-bottom:.4rem}
.sc-nm{font-size:.66rem;font-weight:600;letter-spacing:.03em;margin-bottom:.18rem}
.sc-ds{font-size:.58rem;color:var(--muted);line-height:1.4}

/* Toast */
#toast{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%) translateY(6px);background:var(--surface);border:1px solid var(--border);color:#f4f1eb;padding:.4rem 1rem;font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.1em;opacity:0;transition:.2s;pointer-events:none;z-index:300;border-radius:2px;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:#6fcf6f;color:#6fcf6f}
#toast.err{border-color:#e07060;color:#e07060}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="/admin.html" class="tlogo">Z</a>
  <div class="tsep"></div>
  <span class="ttitle">Page Builder</span>

  <div class="tog" id="pvTog">
    <button class="on" data-m="desk" onclick="setPvMode('desk')">🖥 Desktop</button>
    <button data-m="mob" onclick="setPvMode('mob')">📱 Mobile</button>
  </div>

  <div class="tog" id="thTog">
    <button class="on" data-t="dark" onclick="setTheme('dark')" title="Dark">🌙</button>
    <button data-t="light" onclick="setTheme('light')" title="Light">☀️</button>
  </div>

  <span id="tstatus">Loading…</span>
  <div class="tsep"></div>
  <button class="tbtn tbtn-ghost" onclick="saveDraft()">Save Draft</button>
  <button class="tbtn tbtn-solid" onclick="publish()">Publish</button>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sb">
    <div class="sb-hd"><span>Sections</span><span id="secCount">0</span></div>
    <div class="sec-list" id="secList"></div>
    <div class="sb-ft">
      <button class="add-btn" onclick="openLib()">+ Add Section</button>
    </div>
  </aside>

  <!-- EDITOR -->
  <div class="ed hidden" id="editor">
    <div class="ed-hd">
      <div>
        <div class="ed-tp" id="edType">—</div>
        <div class="ed-nm" id="edName">Settings</div>
      </div>
      <button class="ed-x" onclick="closeEd()">×</button>
    </div>
    <div class="ed-body" id="edBody"></div>
  </div>

  <!-- PREVIEW -->
  <div class="pv">
    <div class="pv-bar">
      <span>Live Preview</span>
      <span id="pvDims">—</span>
    </div>
    <div class="pv-wrap">
      <div class="pv-frame desk" id="pvFrame">
        <iframe id="pvIframe" src="/index.html?builder=1" title="Preview" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      </div>
    </div>
  </div>
</div>

<!-- SECTION LIBRARY -->
<div class="mover" id="libModal">
  <div class="mbox">
    <div class="mbox-hd">
      <h3>Add Section</h3>
      <button class="mx" onclick="closeLib()">×</button>
    </div>
    <div class="mbox-body" id="libGrid"></div>
  </div>
</div>

<div id="toast"></div>

<script src="/supabase.min.js?v=3277b334"></script>
<script src="/supabase-client.js?v=1"></script>
<script>
'use strict';
// ── SUPABASE ──────────────────────────────────────────────────────────────
const SUPA_URL  = 'https://qfgnrsifcwdubkolsgsq.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFmZ25yc2lmY3dkdWJrb2xzZ3NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDgzMTUsImV4cCI6MjA4ODU4NDMxNX0.wthoTJEdQhLKnrTwq7nuzAB3Q3FV5rOGVcyi5v1jyLY';

function getSb() {
  if (window.sb) return window.sb;
  if (typeof supabase !== 'undefined') return supabase.createClient(SUPA_URL, SUPA_ANON);
  return null;
}

// ── STATE ─────────────────────────────────────────────────────────────────
const DEFAULT = [
  {id:'hero',     type:'hero',    label:'Hero',         visible:true, order:0, settings:{kicker:'Release 001 — Sept 20, 2026', heading:'For Those\nWho Dream.', subtext:'Bold athletic sportswear built for the relentless. Those who move with purpose.', cta1_text:'Explore Release 001', cta1_url:'#drop001', cta2_on:true, cta2_text:'Get Early Access', cta2_url:'#notify', img_btn_on:false, img_btn_text:'Shop Now', img_btn_url:'/drop001.html', image:''}},
  {id:'marquee',  type:'marquee', label:'Marquee',      visible:true, order:1, settings:{items:'ZUWERA, RELEASE 001, FOR THOSE WHO DREAM, SEP 20 2026, ATHLETIC SPORTSWEAR'}},
  {id:'about',    type:'about',   label:'About',        visible:true, order:2, settings:{label:'About Zuwera', heading:'Built For\nMovement.', body:'Bold, athletic, and designed for those who dream big. Zuwera is sportswear built for the relentless.\n\nRelease 001 is the beginning. A collection of jackets crafted for those who move with purpose.', s1v:'001', s1l:'First Release', s2v:'2026', s2l:'Launching', s3v:'3', s3l:'Styles'}},
  {id:'release',  type:'release', label:'Release Drop', visible:true, order:3, settings:{eyebrow:'Zuwera Release 001', title:'Release\n001', notify_on:true, notify_label:'Get Early Access', launch_date:'2026-09-20'}},
  {id:'products', type:'products',label:'Products',     visible:true, order:4, settings:{title:'Release 001', subtitle:'Releasing 09 / 20 / 2026'}},
];

const TYPES = {
  hero:     {icon:'🎯', desc:'Full-screen hero with CTAs'},
  marquee:  {icon:'📜', desc:'Scrolling ticker strip'},
  about:    {icon:'ℹ️',  desc:'Brand story + stats'},
  release:  {icon:'🚀', desc:'Drop countdown + notify'},
  products: {icon:'👕', desc:'Products from collection'},
  spacer:   {icon:'↕️',  desc:'Empty spacing block'},
  text:     {icon:'✍️',  desc:'Heading + body + CTA'},
  img_cta:  {icon:'🖼️',  desc:'Image with click button'},
  html:     {icon:'</>',desc:'Custom HTML (advanced)'},
};

let sections = [];
let selId = null;
let pvMode = 'desk';
let pvTheme = 'dark';
let dirty = false;
let _tt;

// ── INIT ──────────────────────────────────────────────────────────────────
(async function init() {
  try {
    const sb = getSb();
    if (sb) {
      const { data } = await sb.from('site_settings').select('*').eq('key','page_builder').single();
      if (data && data.value && data.value.sections) {
        sections = data.value.sections;
        status('Last saved ' + new Date(data.value.updated_at||Date.now()).toLocaleDateString());
      } else {
        sections = JSON.parse(JSON.stringify(DEFAULT));
        status('Defaults loaded');
      }
    } else {
      sections = JSON.parse(JSON.stringify(DEFAULT));
      status('Ready (offline)');
    }
  } catch(e) {
    sections = JSON.parse(JSON.stringify(DEFAULT));
    status('Ready');
  }
  renderSidebar();
  setPvMode('desk');
  document.getElementById('pvIframe').addEventListener('load', sendCfg);
})();

// ── SIDEBAR ───────────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('secList');
  const sorted = [...sections].sort((a,b)=>(a.order||0)-(b.order||0));
  list.innerHTML = '';
  sorted.forEach(s => {
    const t = TYPES[s.type] || {icon:'📦'};
    const d = document.createElement('div');
    d.className = 'sec-item' + (selId===s.id?' sel':'');
    d.dataset.id = s.id;
    d.draggable = true;
    d.innerHTML =
      `<span class="drag-h">⠿</span>` +
      `<span class="sec-ico">${t.icon}</span>` +
      `<div style="flex:1;min-width:0"><div class="sec-nm">${s.label}</div><div class="sec-tp">${s.type}</div></div>` +
      `<button class="vis-btn${s.visible?'':' off'}" title="${s.visible?'Hide':'Show'}" onclick="toggleVis('${s.id}',event)">${s.visible?'👁':'👁'}</button>`;
    d.addEventListener('click', e => { if(!e.target.closest('.vis-btn')) selectSec(s.id); });
    d.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain',s.id); d.style.opacity='.4'; });
    d.addEventListener('dragend', () => d.style.opacity='');
    d.addEventListener('dragover', e => { e.preventDefault(); d.classList.add('drag-over'); });
    d.addEventListener('dragleave', () => d.classList.remove('drag-over'));
    d.addEventListener('drop', e => { e.preventDefault(); d.classList.remove('drag-over'); reorder(e.dataTransfer.getData('text/plain'), s.id); });
    list.appendChild(d);
  });
  document.getElementById('secCount').textContent = sections.length;
}

function toggleVis(id, e) {
  e.stopPropagation();
  const s = sections.find(x=>x.id===id);
  if (s) { s.visible = !s.visible; dirty=true; renderSidebar(); sendCfg(); if(selId===id) openEditor(s); }
}

function reorder(fromId, toId) {
  const s = [...sections].sort((a,b)=>(a.order||0)-(b.order||0));
  const fi = s.findIndex(x=>x.id===fromId), ti = s.findIndex(x=>x.id===toId);
  if (fi<0||ti<0) return;
  const [m] = s.splice(fi,1); s.splice(ti,0,m);
  s.forEach((x,i) => { const sec=sections.find(y=>y.id===x.id); if(sec) sec.order=i; });
  dirty=true; renderSidebar(); sendCfg();
}

// ── EDITOR ────────────────────────────────────────────────────────────────
function selectSec(id) {
  selId = id;
  const s = sections.find(x=>x.id===id);
  renderSidebar();
  if (s) openEditor(s);
}

function openEditor(s) {
  const ed = document.getElementById('editor');
  ed.classList.remove('hidden');
  document.getElementById('edType').textContent = s.type;
  document.getElementById('edName').textContent = s.label;
  document.getElementById('edBody').innerHTML = buildForm(s);
  document.getElementById('edBody').querySelectorAll('input,textarea,select').forEach(el => {
    el.addEventListener('input',  () => syncForm(s));
    el.addEventListener('change', () => syncForm(s));
  });
}

function closeEd() {
  selId = null;
  document.getElementById('editor').classList.add('hidden');
  renderSidebar();
}

function syncForm(s) {
  document.getElementById('edBody').querySelectorAll('[data-f]').forEach(el => {
    s.settings[el.dataset.f] = el.type==='checkbox' ? el.checked : el.value;
  });
  const nm = document.querySelector('[data-f="label"]');
  if (nm) s.label = nm.value;
  dirty = true; sendCfg();
}

function f(key, lbl, val='', type='text', hint='') {
  return `<div class="field"><label>${lbl}</label><input type="${type}" data-f="${key}" value="${he(val)}" placeholder="${hint}"></div>`;
}
function ta(key, lbl, val='', hint='') {
  return `<div class="field"><label>${lbl}</label><textarea data-f="${key}" placeholder="${hint}">${he(val)}</textarea></div>`;
}
function tog2(key, lbl, checked) {
  return `<div class="tog2"><label>${lbl}</label><label class="switch"><input type="checkbox" data-f="${key}" ${checked?'checked':''}><span class="sw-sl"></span></label></div>`;
}
function fdiv() { return '<div class="fdiv"></div>'; }
function fhd(t) { return `<div class="fl">${t}</div>`; }
function he(v) { return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function buildForm(s) {
  const g = s.settings || {};
  let h = '';
  switch(s.type) {
    case 'hero':
      h = f('image','Background Image URL', g.image,'text','https:// or leave blank') +
          fdiv() + fhd('Text') +
          ta('kicker','Kicker Text', g.kicker) +
          ta('heading','Heading (↵ = line break)', g.heading) +
          ta('subtext','Subtext', g.subtext) +
          fdiv() + fhd('Primary Button') +
          f('cta1_text','Button Text', g.cta1_text) + f('cta1_url','URL/Anchor', g.cta1_url) +
          fdiv() + fhd('Secondary Button') +
          tog2('cta2_on','Show', g.cta2_on) + f('cta2_text','Text', g.cta2_text) + f('cta2_url','URL', g.cta2_url) +
          fdiv() + fhd('Click-on-image Button') +
          tog2('img_btn_on','Show', g.img_btn_on) + f('img_btn_text','Text', g.img_btn_text) + f('img_btn_url','URL', g.img_btn_url);
      break;
    case 'marquee':
      h = `<div class="field"><label>Items (comma-separated)</label><textarea data-f="items" placeholder="ZUWERA, RELEASE 001, ...">${he(g.items)}</textarea><span class="fhint">Separate with commas. Each item appears with a ✦ divider.</span></div>`;
      break;
    case 'about':
      h = f('label','Section Label', g.label) + ta('heading','Heading (↵ = line break)', g.heading) +
          ta('body','Body (↵↵ = new paragraph)', g.body) + fdiv() + fhd('Stats') +
          `<div class="fgroup"><div class="fgroup-lbl">Stat 1</div>` + f('s1v','Number',g.s1v) + f('s1l','Label',g.s1l) + `</div>` +
          `<div class="fgroup"><div class="fgroup-lbl">Stat 2</div>` + f('s2v','Number',g.s2v) + f('s2l','Label',g.s2l) + `</div>` +
          `<div class="fgroup"><div class="fgroup-lbl">Stat 3</div>` + f('s3v','Number',g.s3v) + f('s3l','Label',g.s3l) + `</div>`;
      break;
    case 'release':
      h = f('eyebrow','Eyebrow Label', g.eyebrow) + ta('title','Title (↵ = line break)', g.title) +
          f('launch_date','Launch Date', g.launch_date,'date') + fdiv() +
          tog2('notify_on','Show Notify Form', g.notify_on) + f('notify_label','Form Label', g.notify_label);
      break;
    case 'products':
      h = f('title','Section Title', g.title) + f('subtitle','Subtitle', g.subtitle);
      break;
    case 'spacer':
      h = `<div class="field"><label>Height</label><select data-f="height">
        <option value="sm" ${g.height==='sm'?'selected':''}>Small (2rem)</option>
        <option value="md" ${(!g.height||g.height==='md')?'selected':''}>Medium (4rem)</option>
        <option value="lg" ${g.height==='lg'?'selected':''}>Large (8rem)</option>
      </select></div>`;
      break;
    case 'text':
      h = f('heading','Heading (optional)',g.heading) + ta('body','Body Text',g.body) +
          fdiv() + f('cta_text','Button Text (optional)',g.cta_text) + f('cta_url','Button URL',g.cta_url);
      break;
    case 'img_cta':
      h = f('image','Image URL',g.image,'text','https://...') + f('alt','Alt Text',g.alt) + fdiv() +
          tog2('btn_on','Show Button', g.btn_on) + f('btn_text','Button Text',g.btn_text) + f('btn_url','Button URL',g.btn_url);
      break;
    case 'html':
      h = `<div class="field"><label>HTML</label><textarea data-f="html" style="min-height:160px;font-size:.68rem;font-family:'IBM Plex Mono',monospace" placeholder="<div>...</div>">${he(g.html)}</textarea><span class="fhint" style="color:#e07060">⚠ Raw HTML — use with care.</span></div>`;
      break;
  }
  h += `<button class="del-sec" onclick="removeSec('${s.id}')">🗑 Remove Section</button>`;
  return h;
}

// ── LIBRARY ───────────────────────────────────────────────────────────────
function openLib() {
  document.getElementById('libGrid').innerHTML = Object.entries(TYPES).map(([type,d]) =>
    `<div class="sc" onclick="addSec('${type}')"><div class="sc-ico">${d.icon}</div><div class="sc-nm">${type.replace('_',' ')}</div><div class="sc-ds">${d.desc}</div></div>`
  ).join('');
  document.getElementById('libModal').classList.add('open');
}
function closeLib() { document.getElementById('libModal').classList.remove('open'); }

function addSec(type) {
  closeLib();
  const id = type+'-'+Date.now();
  const maxOrd = Math.max(...sections.map(s=>s.order||0), -1);
  const defs = {
    spacer:{height:'md'}, text:{heading:'',body:'Your text here.',cta_text:'',cta_url:''},
    img_cta:{image:'',alt:'',btn_on:true,btn_text:'Shop Now',btn_url:'/drop001.html'},
    html:{html:'<div style="padding:2rem;text-align:center">Custom section</div>'}
  };
  sections.push({id,type,label:type.replace('_',' ').replace(/\b\w/g,c=>c.toUpperCase()),visible:true,order:maxOrd+1,settings:defs[type]||{}});
  dirty=true; renderSidebar(); selectSec(id); sendCfg();
  toast('Section added');
}

function removeSec(id) {
  if (!confirm('Remove this section?')) return;
  sections = sections.filter(s=>s.id!==id);
  if (selId===id) closeEd();
  dirty=true; renderSidebar(); sendCfg();
  toast('Removed');
}

// ── PREVIEW ───────────────────────────────────────────────────────────────
function setPvMode(m) {
  pvMode = m;
  document.querySelectorAll('#pvTog button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  const f = document.getElementById('pvFrame');
  f.className = 'pv-frame ' + m;
  document.getElementById('pvDims').textContent = m==='mob'?'390 × 820':'1280px wide';
}

function setTheme(t) {
  pvTheme = t;
  document.querySelectorAll('#thTog button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  sendCfg();
}

function sendCfg() {
  try {
    document.getElementById('pvIframe').contentWindow.postMessage({
      type:'ZW_BUILDER_CONFIG', sections, theme:pvTheme
    },'*');
  } catch(e){}
}

// ── SAVE / PUBLISH ────────────────────────────────────────────────────────
async function saveDraft() {
  status('Saving…');
  await saveToSupa(false);
}
async function publish() {
  status('Publishing…');
  await saveToSupa(true);
}
async function saveToSupa(pub) {
  try {
    const sb = getSb();
    if (!sb) { toast('No DB connection','err'); return; }
    const { error } = await sb.from('site_settings').upsert({
      key:'page_builder',
      value:{sections, updated_at:new Date().toISOString(), published:pub},
      updated_at:new Date().toISOString()
    },{onConflict:'key'});
    if (error) throw error;
    dirty = false;
    status(pub ? 'Published ✓' : 'Draft saved');
    toast(pub ? 'Published! Changes are live.' : 'Draft saved', 'ok');
  } catch(e) {
    console.error(e);
    toast('Save failed','err');
    status('Save failed');
  }
}

function status(msg) { document.getElementById('tstatus').textContent = msg; }

function toast(msg, type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='on'+(type?' '+type:'');
  clearTimeout(_tt); _tt=setTimeout(()=>el.className='',2800);
}

window.addEventListener('beforeunload', e=>{ if(dirty){e.preventDefault();e.returnValue='';} });
</script>
