<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Page Builder — Zuwera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Barlow:wght@400;500;600&family=Barlow+Condensed:ital,wght@1,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0f0f11;color:#f4f1eb;font-family:'Barlow',sans-serif;font-size:13px}
:root{--bg:#0f0f11;--sf:#17171b;--sf2:#1e1e24;--bd:rgba(255,255,255,.08);--mu:rgba(244,241,235,.42);--ac:#F891A5}
body{display:flex;flex-direction:column}
.topbar{height:46px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:.5rem;padding:0 .9rem;flex-shrink:0;z-index:50;overflow-x:auto}
.tlogo{font-family:'Barlow Condensed',sans-serif;font-style:italic;font-weight:900;font-size:1.15rem;color:#f4f1eb;text-decoration:none;flex-shrink:0}
.tsep{width:1px;height:18px;background:var(--bd);flex-shrink:0}
.ttitle{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);flex:1;white-space:nowrap}
.tbtn{border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;padding:.35rem .75rem;border-radius:2px;transition:.14s;flex-shrink:0;white-space:nowrap}
.tbtn-ghost{background:transparent;border:1px solid var(--bd);color:var(--mu)}
.tbtn-ghost:hover{border-color:rgba(255,255,255,.25);color:#f4f1eb}
.tbtn-solid{background:#f4f1eb;color:#0f0f11;font-weight:600}
.tbtn-solid:hover{opacity:.88}
.tbtn-warn{background:transparent;border:1px solid rgba(224,112,96,.3);color:rgba(224,112,96,.7)}
.tbtn-warn:hover{border-color:rgba(224,112,96,.7);color:rgba(224,112,96,.9)}
.tog{display:flex;gap:1px;background:var(--sf2);padding:2px;border-radius:3px;flex-shrink:0}
.tog button{background:none;border:none;color:var(--mu);font-family:'IBM Plex Mono',monospace;font-size:.53rem;letter-spacing:.06em;text-transform:uppercase;padding:.22rem .55rem;cursor:pointer;border-radius:2px;transition:.13s;white-space:nowrap}
.tog button.on{background:var(--sf);color:#f4f1eb;box-shadow:0 1px 3px rgba(0,0,0,.4)}
#tstatus{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.1em;color:var(--mu);white-space:nowrap;flex-shrink:0}
.autosave-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--mu);margin-right:.3rem;vertical-align:middle;transition:background .3s}
.autosave-dot.active{background:#6fcf6f}
.layout{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sb{width:240px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;min-height:0}
.sb-hd{padding:.55rem .8rem .45rem;border-bottom:1px solid var(--bd);font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.sec-list{flex:1;overflow-y:auto;padding:.3rem}
.sec-item{display:flex;align-items:center;gap:.4rem;padding:.4rem .5rem;border-radius:3px;cursor:pointer;transition:background .11s;border:1px solid transparent;margin-bottom:2px;user-select:none;position:relative}
.sec-item:hover{background:var(--sf2)}
.sec-item.sel{background:var(--sf2);border-color:var(--ac)}
.sec-item.drag-over{border-color:var(--ac);background:rgba(248,145,165,.06)}
.sec-item.hidden-sec{opacity:.45}
.drag-h{color:var(--mu);cursor:grab;font-size:.65rem;opacity:.35;flex-shrink:0;line-height:1}
.drag-h:active{cursor:grabbing}
.sec-ico{font-size:.75rem;width:16px;text-align:center;flex-shrink:0}
.sec-nm{flex:1;font-size:.68rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sec-tp{font-family:'IBM Plex Mono',monospace;font-size:.46rem;letter-spacing:.1em;color:var(--mu);text-transform:uppercase}
.sec-acts{display:flex;gap:1px;opacity:0;transition:opacity .12s;flex-shrink:0}
.sec-item:hover .sec-acts{opacity:1}
.sec-act{background:none;border:none;cursor:pointer;font-size:.65rem;color:var(--mu);padding:2px 3px;border-radius:2px;line-height:1;transition:.12s}
.sec-act:hover{color:#f4f1eb;background:rgba(255,255,255,.08)}
.sec-act.danger:hover{color:#e07060}
.vis-btn{background:none;border:none;cursor:pointer;font-size:.65rem;color:#f4f1eb;opacity:.35;transition:.12s;padding:0;line-height:1;flex-shrink:0}
.vis-btn:hover{opacity:1}
.sb-ft{padding:.55rem .8rem;border-top:1px solid var(--bd);flex-shrink:0}
.add-btn{width:100%;background:transparent;border:1px dashed rgba(255,255,255,.14);color:var(--mu);font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;padding:.48rem;cursor:pointer;border-radius:2px;transition:.13s}
.add-btn:hover{border-color:var(--ac);color:var(--ac)}

/* Editor */
.ed{width:300px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
.ed.hidden{width:0;border-right:none}
.ed-hd{padding:.55rem .8rem .45rem;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;gap:.45rem;flex-shrink:0}
.ed-tp{font-family:'IBM Plex Mono',monospace;font-size:.48rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ac)}
.ed-nm{font-size:.7rem;font-weight:600;letter-spacing:.02em}
.ed-x{background:none;border:none;color:var(--mu);cursor:pointer;font-size:1.1rem;line-height:1;padding:0;margin-left:auto;flex-shrink:0;transition:.12s}
.ed-x:hover{color:#f4f1eb}
.ed-body{flex:1;overflow-y:auto;padding:.7rem .8rem;display:flex;flex-direction:column;gap:.7rem}
.field{display:flex;flex-direction:column;gap:.25rem}
.field label,.fl{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mu)}
.field input,.field textarea,.field select{background:var(--sf2);border:1px solid var(--bd);color:#f4f1eb;font-family:'Barlow',sans-serif;font-size:.74rem;padding:.38rem .52rem;outline:none;transition:border-color .13s;border-radius:2px;width:100%}
.field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(255,255,255,.28)}
.field textarea{resize:vertical;min-height:56px;line-height:1.5}
.field input[type=color]{height:32px;padding:2px 4px;cursor:pointer}
.field input[type=range]{padding:0;height:20px;cursor:pointer;accent-color:var(--ac)}
.fdiv{height:1px;background:var(--bd);margin:.05rem 0}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.35rem}
.tog2{display:flex;align-items:center;justify-content:space-between}
.tog2 label{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mu)}
.switch{position:relative;width:30px;height:16px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0;position:absolute}
.sw-sl{position:absolute;inset:0;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;cursor:pointer;transition:.14s}
.sw-sl::before{content:'';position:absolute;width:10px;height:10px;left:2px;top:2px;background:var(--mu);border-radius:50%;transition:.14s}
.switch input:checked+.sw-sl{background:var(--ac);border-color:var(--ac)}
.switch input:checked+.sw-sl::before{transform:translateX(14px);background:#fff}
.fhint{font-size:.58rem;color:var(--mu);line-height:1.5}
.fgroup{background:var(--sf2);border:1px solid var(--bd);border-radius:3px;padding:.55rem;display:flex;flex-direction:column;gap:.4rem}
.fgroup-lbl{font-family:'IBM Plex Mono',monospace;font-size:.48rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ac);margin-bottom:.1rem}
.flist{display:flex;flex-direction:column;gap:.4rem}
.flist-item{background:var(--sf2);border:1px solid var(--bd);border-radius:3px;padding:.5rem}
.flist-item-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem}
.flist-item-lbl{font-family:'IBM Plex Mono',monospace;font-size:.48rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mu)}
.flist-rm{background:none;border:none;cursor:pointer;color:rgba(224,112,96,.55);font-size:.62rem;padding:0;line-height:1;transition:.12s}
.flist-rm:hover{color:rgba(224,112,96,.9)}
.add-item-btn{background:transparent;border:1px dashed rgba(255,255,255,.12);color:var(--mu);font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem;cursor:pointer;border-radius:2px;width:100%;transition:.12s;margin-top:.2rem}
.add-item-btn:hover{border-color:var(--ac);color:var(--ac)}
.del-sec{background:transparent;border:1px solid rgba(224,112,96,.2);color:rgba(224,112,96,.55);font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;padding:.38rem;cursor:pointer;width:100%;border-radius:2px;transition:.13s;margin-top:.2rem}
.del-sec:hover{border-color:rgba(224,112,96,.6);color:rgba(224,112,96,.9)}
.apply-btn{width:100%;background:var(--ac);color:#0f0f11;border:none;font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:.48rem;cursor:pointer;border-radius:2px;font-weight:600;transition:.13s;margin-top:.15rem}
.apply-btn:hover{opacity:.88}
.img-btn{background:var(--sf2);border:1px solid var(--bd);color:var(--mu);font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;padding:.26rem .55rem;cursor:pointer;border-radius:2px;transition:.13s}
.img-btn:hover{border-color:rgba(255,255,255,.22);color:#f4f1eb}
.range-row{display:flex;align-items:center;gap:.5rem}
.range-val{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--mu);min-width:2rem;text-align:right;flex-shrink:0}

/* Preview */
.pv{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0a0a0a}
.pv-bar{padding:.32rem .8rem;background:var(--sf);border-bottom:1px solid var(--bd);font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.1em;color:var(--mu);display:flex;align-items:center;gap:.55rem;flex-shrink:0}
.pv-wrap{flex:1;overflow:hidden;display:flex;align-items:flex-start;justify-content:center;padding:.8rem;background:repeating-linear-gradient(45deg,#0d0d0d 0,#0d0d0d 10px,#0a0a0a 10px,#0a0a0a 20px)}
.pv-frame{background:#fff;box-shadow:0 8px 40px rgba(0,0,0,.7);overflow:hidden;transition:all .25s;flex-shrink:0}
.pv-frame.desk{width:100%;height:calc(100vh - 46px - 38px - 1.6rem);border-radius:4px;max-width:1280px}
.pv-frame.mob{width:390px;height:calc(100vh - 46px - 38px - 1.6rem);max-height:820px;border-radius:14px}
.pv-frame iframe{width:100%;height:100%;border:none;display:block}

/* Library modal */
.mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.mover.open{display:flex}
.mbox{background:var(--sf);border:1px solid var(--bd);width:min(620px,93vw);max-height:80vh;overflow-y:auto;border-radius:5px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.mbox-hd{padding:.75rem .95rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--sf);z-index:1}
.mbox-hd h3{font-size:.75rem;font-weight:600;letter-spacing:.04em}
.mbox-hd p{font-size:.58rem;color:var(--mu);margin-top:.15rem}
.mx{background:none;border:none;color:var(--mu);cursor:pointer;font-size:1.15rem;line-height:1;transition:.12s}
.mx:hover{color:#f4f1eb}
.mbox-body{padding:.8rem;display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem}
.sc{background:var(--sf2);border:1px solid var(--bd);padding:.75rem .65rem;border-radius:3px;cursor:pointer;text-align:center;transition:.13s}
.sc:hover{border-color:var(--ac);background:rgba(248,145,165,.05)}
.sc-ico{font-size:1.25rem;margin-bottom:.35rem}
.sc-nm{font-size:.64rem;font-weight:600;letter-spacing:.02em;margin-bottom:.15rem}
.sc-ds{font-size:.56rem;color:var(--mu);line-height:1.4}
.sc-cat{grid-column:1/-1;font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);padding:.5rem .2rem .2rem;border-bottom:1px solid var(--bd);margin-bottom:.2rem}

/* Toast / error */
#toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(6px);background:var(--sf);border:1px solid var(--bd);color:#f4f1eb;padding:.38rem .9rem;font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.1em;opacity:0;transition:.18s;pointer-events:none;z-index:300;border-radius:2px;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:#6fcf6f;color:#6fcf6f}
#toast.err{border-color:#e07060;color:#e07060}
#errBox{display:none;position:fixed;bottom:1rem;right:1rem;max-width:360px;background:#1a0808;border:1px solid #e07060;color:#f4b8a0;font-family:'IBM Plex Mono',monospace;font-size:.58rem;line-height:1.6;padding:.7rem .9rem;z-index:400;border-radius:3px}
#errBox.on{display:block}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="/admin.html" class="tlogo" title="Back to Admin">Z</a>
  <div class="tsep"></div>
  <span class="ttitle">Page Builder</span>
  <div class="tog" id="pvTog">
    <button class="on" data-m="desk" onclick="setPvMode('desk')">🖥 Desktop</button>
    <button data-m="mob" onclick="setPvMode('mob')">📱 Mobile</button>
  </div>
  <div class="tog" id="thTog">
    <button class="on" data-t="dark" onclick="setTheme('dark')">🌙 Dark</button>
    <button data-t="light" onclick="setTheme('light')">☀️ Light</button>
    <button data-t="super-light" onclick="setTheme('super-light')">❄️ Super Light</button>
  </div>
  <div class="tsep"></div>
  <button class="tbtn tbtn-ghost" onclick="undo()" title="Undo (Ctrl+Z)">↩ Undo</button>
  <button class="tbtn tbtn-ghost" onclick="revertChanges()">↺ Revert</button>
  <button class="tbtn tbtn-ghost" onclick="saveDraft()">💾 Draft</button>
  <button class="tbtn tbtn-solid" onclick="publishPage()">🚀 Publish</button>
  <div class="tsep"></div>
  <span id="tstatus"><span class="autosave-dot" id="autosaveDot"></span>Ready</span>
</div>

<!-- LAYOUT -->
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sb">
    <div class="sb-hd">
      <span>Sections <span id="secCount" style="opacity:.45">0</span></span>
      <span style="font-size:.5rem;opacity:.35">drag to reorder</span>
    </div>
    <div class="sec-list" id="secList"></div>
    <div class="sb-ft">
      <button class="add-btn" onclick="openLib()">+ Add Section</button>
    </div>
  </aside>

  <!-- EDITOR -->
  <div class="ed hidden" id="editor">
    <div class="ed-hd">
      <div style="flex:1;min-width:0">
        <div class="ed-tp" id="edType">—</div>
        <div class="ed-nm" id="edName">Settings</div>
      </div>
      <button class="ed-x" onclick="closeEd()" title="Close">×</button>
    </div>
    <div class="ed-body" id="edBody"></div>
  </div>

  <!-- PREVIEW -->
  <div class="pv">
    <div class="pv-bar">
      <span>Live Preview</span>
      <span style="opacity:.35;font-size:.5rem" id="autoPreviewLabel">auto-updating</span>
      <span id="pvDims" style="margin-left:auto">—</span>
    </div>
    <div class="pv-wrap">
      <div class="pv-frame desk" id="pvFrame">
        <iframe id="pvIframe" src="/index.html?builder=1" title="Preview" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      </div>
    </div>
  </div>
</div>

<!-- LIBRARY MODAL -->
<div class="mover" id="libModal">
  <div class="mbox">
    <div class="mbox-hd">
      <div>
        <h3>Add Section</h3>
        <p>Pick a section type to add below your existing sections</p>
      </div>
      <button class="mx" onclick="closeLib()">×</button>
    </div>
    <div class="mbox-body" id="libGrid"></div>
  </div>
</div>

<div id="toast"></div>
<div id="errBox"><div style="display:flex;justify-content:space-between;margin-bottom:.3rem"><b>Error</b><button onclick="document.getElementById('errBox').classList.remove('on')" style="background:none;border:none;color:inherit;cursor:pointer">×</button></div><div id="errMsg"></div></div>

const DEFAULT_SECTIONS = [
  {id:'hero',    type:'hero',    label:'Hero',         visible:true,order:0},
  {id:'marquee', type:'marquee', label:'Marquee',      visible:true,order:1},
  {id:'about',   type:'about',   label:'About',        visible:true,order:2},
  {id:'release', type:'release', label:'Release Drop', visible:true,order:3},
  {id:'products',type:'products',label:'Products',     visible:true,order:4},
].map(s=>({...s,settings:{...SECT_DEFAULTS[s.type]}}));

// ── STATE ─────────────────────────────────────────────────────────────────
let sections=[], lastSaved=null, undoStack=[], selId=null;
let pvMode='desk', pvTheme='dark', dirty=false;
let _tt, _autosaveT, _previewT;

// ── INIT ──────────────────────────────────────────────────────────────────
(async function init(){
  try{
    const sb=getSb();
    if(sb){
      const{data}=await sb.from('site_settings').select('*').eq('key','page_builder').single();
      if(data?.value?.sections){
        sections=data.value.sections.map(s=>({...s,settings:{...SECT_DEFAULTS[s.type],...(s.settings||{})}}));
        if(data.value.theme){
          pvTheme=data.value.theme;
        }
        lastSaved=clone(sections);
        status('Last saved '+new Date(data.value.updated_at||Date.now()).toLocaleDateString());
      }else throw new Error('no config');
    }else throw new Error('no sb');
  }catch(e){
    sections=clone(DEFAULT_SECTIONS);
    lastSaved=clone(sections);
    status('Ready (defaults)');
  }
  renderSidebar();
  setTheme(pvTheme);
  setPvMode('desk');
  document.getElementById('pvIframe').addEventListener('load',()=>sendCfg());
  // Auto-save every 60s if dirty
  setInterval(()=>{if(dirty)saveDraft(true);},60000);
  // Keyboard shortcuts
  document.addEventListener('keydown',e=>{
    if((e.metaKey||e.ctrlKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
    if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();saveDraft();}
  });
})();

// ── SIDEBAR ───────────────────────────────────────────────────────────────
function renderSidebar(){
  const sorted=[...sections].sort((a,b)=>(a.order||0)-(b.order||0));
  const list=document.getElementById('secList');
  list.innerHTML='';
  sorted.forEach(s=>{
    const t=TYPES[s.type]||{icon:'📦'};
    const d=document.createElement('div');
    d.className='sec-item'+(selId===s.id?' sel':'')+(s.visible?'':' hidden-sec');
    d.dataset.id=s.id; d.draggable=true;
    d.innerHTML=
      `<span class="drag-h">⠿</span>`+
      `<span class="sec-ico">${t.icon}</span>`+
      `<div style="flex:1;min-width:0"><div class="sec-nm">${s.label}</div><div class="sec-tp">${s.type}</div></div>`+
      `<div class="sec-acts">`+
        `<button class="sec-act" title="Duplicate" onclick="dupSec('${s.id}',event)">⎘</button>`+
        `<button class="sec-act danger" title="Delete" onclick="removeSec('${s.id}',event)">✕</button>`+
      `</div>`+
      `<button class="vis-btn" title="${s.visible?'Hide':'Show'}" onclick="toggleVis('${s.id}',event)">${s.visible?'👁':'🙈'}</button>`;
    d.addEventListener('click',e=>{if(!e.target.closest('.sec-acts')&&!e.target.closest('.vis-btn'))selectSec(s.id);});
    d.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',s.id);d.style.opacity='.4';});
    d.addEventListener('dragend',()=>d.style.opacity='');
    d.addEventListener('dragover',e=>{e.preventDefault();d.classList.add('drag-over');});
    d.addEventListener('dragleave',()=>d.classList.remove('drag-over'));
    d.addEventListener('drop',e=>{e.preventDefault();d.classList.remove('drag-over');reorder(e.dataTransfer.getData('text/plain'),s.id);});
    list.appendChild(d);
  });
  document.getElementById('secCount').textContent=sections.length;
}

function toggleVis(id,e){e.stopPropagation();pushUndo();const s=sections.find(x=>x.id===id);if(s){s.visible=!s.visible;markDirty();renderSidebar();schedSend();if(selId===id)openEditor(s);}}

function reorder(fromId,toId){
  if(fromId===toId)return;
  pushUndo();
  const sorted=[...sections].sort((a,b)=>(a.order||0)-(b.order||0));
  const fi=sorted.findIndex(x=>x.id===fromId),ti=sorted.findIndex(x=>x.id===toId);
  if(fi<0||ti<0)return;
  const[m]=sorted.splice(fi,1);sorted.splice(ti,0,m);
  sorted.forEach((x,i)=>{const sec=sections.find(y=>y.id===x.id);if(sec)sec.order=i;});
  markDirty();renderSidebar();schedSend();
}

function dupSec(id,e){
  e.stopPropagation();
  pushUndo();
  const src=sections.find(s=>s.id===id);
  if(!src)return;
  const maxOrd=Math.max(...sections.map(s=>s.order||0),-1);
  const dup={...clone(src),id:src.type+'-'+Date.now(),order:maxOrd+1,label:src.label+' (Copy)'};
  sections.push(dup);
  markDirty();renderSidebar();selectSec(dup.id);schedSend();
  toast('Duplicated');
}

function removeSec(id,e){
  e.stopPropagation();
  if(!confirm('Remove this section?'))return;
  pushUndo();
  sections=sections.filter(s=>s.id!==id);
  if(selId===id)closeEd();
  markDirty();renderSidebar();schedSend();
  toast('Removed');
}

// ── EDITOR ────────────────────────────────────────────────────────────────
function selectSec(id){selId=id;const s=sections.find(x=>x.id===id);renderSidebar();if(s)openEditor(s);}

function openEditor(s){
  document.getElementById('editor').classList.remove('hidden');
  document.getElementById('edType').textContent=s.type;
  document.getElementById('edName').textContent=s.label;
  const body=document.getElementById('edBody');
  body.innerHTML=buildForm(s);
  // Attach listeners for auto-preview
  body.querySelectorAll('input,textarea,select').forEach(el=>{
    el.addEventListener('input',()=>{pushUndo();syncForm(s);schedSend();});
    el.addEventListener('change',()=>{pushUndo();syncForm(s);schedSend();});
  });
  body.querySelectorAll('.img-btn[data-pick]').forEach(b=>b.addEventListener('click',()=>pickBuiltinImg(b.dataset.pick)));
  body.querySelectorAll('.img-btn[data-upload]').forEach(b=>b.addEventListener('click',()=>uploadImg(b.dataset.upload)));
  // Range value display
  body.querySelectorAll('input[type=range]').forEach(r=>{
    const disp=body.querySelector(`[data-range-disp="${r.dataset.f}"]`);
    if(disp){disp.textContent=r.value+(r.dataset.unit||'');r.addEventListener('input',()=>disp.textContent=r.value+(r.dataset.unit||''));}
  });
}

function closeEd(){selId=null;document.getElementById('editor').classList.add('hidden');renderSidebar();}

function syncForm(s){
  const body=document.getElementById('edBody');
  if(!body)return;
  body.querySelectorAll('[data-f]').forEach(el=>{
    const k=el.dataset.f;
    if(el.type==='checkbox')s.settings[k]=el.checked;
    else if(el.type==='number')s.settings[k]=parseFloat(el.value)||0;
    else s.settings[k]=el.value;
  });
  // Dynamic arrays
  body.querySelectorAll('[data-arr]').forEach(container=>{
    const key=container.dataset.arr;
    const items=[];
    container.querySelectorAll('[data-arr-item]').forEach(item=>{
      const obj={};
      item.querySelectorAll('[data-f]').forEach(el=>{obj[el.dataset.f]=el.type==='checkbox'?el.checked:el.value;});
      items.push(obj);
    });
    s.settings[key]=items;
  });
  const nm=body.querySelector('[data-section-label]');
  if(nm)s.label=nm.value;
  markDirty();
}

const ta=(k,l,v='',ph='')=>`<div class="field"><label>${l}</label><textarea data-f="${k}" placeholder="${ph}">${he(v)}</textarea></div>`;
const sel=(k,l,v,opts)=>`<div class="field"><label>${l}</label><select data-f="${k}">${opts.map(([val,txt])=>`<option value="${val}"${v===val?' selected':''}>${txt}</option>`).join('')}</select></div>`;
const tog2=(k,l,checked)=>`<div class="tog2"><label>${l}</label><label class="switch"><input type="checkbox" data-f="${k}" ${checked?'checked':''}><span class="sw-sl"></span></label></div>`;

const rangeF=(k,l,v,min,max,unit='')=>`<div class="field"><label>${l}</label><div class="range-row"><input type="range" data-f="${k}" data-unit="${unit}" min="${min}" max="${max}" value="${v}" style="flex:1"><span class="range-val" data-range-disp="${k}">${v}${unit}</span></div></div>`;

function imgField(key,lbl,val=''){
  const prev=val?`<img data-preview="${key}" src="${he(val)}" style="width:100%;height:72px;object-fit:cover;border:1px solid var(--bd);border-radius:2px;margin-bottom:.3rem;display:block">`:`<div data-preview="${key}" style="display:none"></div>`;
  return `<div class="field"><label>${lbl}</label>${prev}<input type="text" data-f="${key}" value="${he(val)}" placeholder="/images/hero.jpg or https://..."><div style="display:flex;gap:.35rem;margin-top:.28rem"><button type="button" class="img-btn" data-pick="${key}">📁 Site Images</button><button type="button" class="img-btn" data-upload="${key}">⬆ Upload</button></div></div>`;

function arrField(key,lbl,items,fieldDefs){
  const rows=items.map((item,i)=>`<div data-arr-item style="background:var(--bg);border:1px solid var(--bd);border-radius:2px;padding:.45rem .5rem;margin-bottom:.3rem"><div class="flist-item-hd"><span class="flist-item-lbl">${lbl} ${i+1}</span><button class="flist-rm" onclick="removeArrItem(this,'${key}')">✕</button></div>${fieldDefs.map(([k,l,type])=>`<div class="field" style="margin-top:.3rem"><label>${l}</label><${type==='textarea'?'textarea data-f="'+k+'"':('input type="'+type+'" data-f="'+k+'"')} ${type==='textarea'?'':'value="'+he(item[k]||'')+'"'}>${type==='textarea'?he(item[k]||''):''}${type==='textarea'?'</textarea>':'>'}</div>`).join('')}</div>`).join('');
  return `<div class="flist" data-arr="${key}">${rows}</div><button class="add-item-btn" onclick="addArrItem('${key}')">+ Add ${lbl}</button>`;
}

function syncColorHex(hexInput,fieldKey){
  const colorInput=document.querySelector(`[data-f="${fieldKey}"]`);
  if(colorInput&&hexInput.value.match(/^#[0-9a-f]{6}$/i))colorInput.value=hexInput.value;
}

window.removeArrItem=function(btn,key){
  const item=btn.closest('[data-arr-item]');
  if(item){item.remove();const s=sections.find(x=>x.id===selId);if(s)syncForm(s);}
};

window.addArrItem=function(key){
  const s=sections.find(x=>x.id===selId);
  if(!s)return;
  if(!s.settings[key])s.settings[key]=[];
  const def={};
  // guess default structure from first item
  const first=s.settings[key][0]||{};
  Object.keys(first).forEach(k=>def[k]='');
  s.settings[key].push(def);
  openEditor(s);
  toast('Item added');
};

        `<div class="field"><label>Video URL</label><input data-f="url" value="${he(g.url)}" placeholder="YouTube or Vimeo URL"><span class="fhint">Paste a YouTube or Vimeo video URL</span></div>`+
        f('caption','Caption (optional)',g.caption)+
        tog2('controls','Show Controls',g.controls!==false)+
        tog2('autoplay','Autoplay',g.autoplay)+
        tog2('muted','Muted',g.muted!==false);
      break;
    case 'countdown':
      h=`<div class="field"><label>Section Label</label><input data-section-label value="${he(s.label)}"></div>`+
        f('heading','Heading',g.heading)+
        f('launch_date','Launch Date & Time',g.launch_date,'datetime-local')+
        sel('align','Alignment',g.align,[['center','Center'],['left','Left']])+
        tog2('show_labels','Show Unit Labels',g.show_labels!==false);
      break;
    case 'spacer':
      h=`<div class="field"><label>Section Label</label><input data-section-label value="${he(s.label)}"></div>`+
        sel('height','Height',g.height,[['xs','Extra Small (1rem)'],['sm','Small (2rem)'],['md','Medium (4rem)'],['lg','Large (8rem)'],['xl','Extra Large (12rem)']]);
      break;
    case 'text':
      h=`<div class="field"><label>Section Label</label><input data-section-label value="${he(s.label)}"></div>`+
        f('heading','Heading (optional)',g.heading)+
        f('heading_size','Heading Size',g.heading_size||'2rem','text','2rem, 1.5rem, clamp(...)')+
        ta('body','Body Text',g.body)+
        sel('align','Alignment',g.align,[['left','Left'],['center','Center'],['right','Right']])+fdiv()+
        f('cta_text','Button Text (optional)',g.cta_text)+f('cta_url','Button URL',g.cta_url);
      break;
    case 'img_cta':
      h=`<div class="field"><label>Section Label</label><input data-section-label value="${he(s.label)}"></div>`+
        imgField('image','Image',g.image)+f('alt','Alt Text',g.alt)+fdiv()+
        tog2('btn_on','Show Button',g.btn_on)+f('btn_text','Button Text',g.btn_text)+f('btn_url','Button URL',g.btn_url)+
        sel('btn_position','Button Position',g.btn_position,[['center','Center'],['bottom-left','Bottom Left'],['bottom-right','Bottom Right'],['top-right','Top Right']]);
      break;
    case 'html':
      h=`<div class="field"><label>Section Label</label><input data-section-label value="${he(s.label)}"></div>`+
        `<div class="field"><label>HTML</label><textarea data-f="html" style="min-height:140px;font-size:.66rem;font-family:'IBM Plex Mono',monospace" placeholder="<div>...</div>">${he(g.html)}</textarea><span class="fhint" style="color:#e07060">⚠ Raw HTML — use carefully.</span></div>`;
      break;
    default:h='<div style="padding:.5rem;color:var(--mu);font-size:.68rem">No settings for this type.</div>';
  }
  h+=`<div class="fdiv" style="margin-top:.5rem"></div><button class="apply-btn" onclick="applyBtn()">▶ Apply to Preview</button>`;
  h+=`<button class="del-sec" onclick="removeSec('${s.id}',{stopPropagation:()=>{}})">🗑 Remove Section</button>`;
  return h;
}

function applyBtn(){
  const s=sections.find(x=>x.id===selId);
  if(s){syncForm(s);sendCfg();toast('Sent to preview');}
}

// ── IMAGE PICKER ──────────────────────────────────────────────────────────
const SITE_IMGS=[
  {label:'Hero',src:'/images/hero.jpg'},{label:'Hero Mobile',src:'/images/hero-mobile.jpg'},
  {label:'OG Image',src:'/images/og-image.jpg'},{label:'Wordmark',src:'/images/wordmark.png'},
];
let _imgKey=null;

function pickBuiltinImg(k){
  _imgKey=k;
  let m=document.getElementById('imgPickModal');
  if(!m){
    m=document.createElement('div');m.id='imgPickModal';
    m.style.cssText='display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:600;align-items:center;justify-content:center;backdrop-filter:blur(3px)';
    m.innerHTML=`<div style="background:var(--sf);border:1px solid var(--bd);width:min(480px,90vw);border-radius:4px;overflow:hidden"><div style="padding:.7rem .9rem;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center"><span style="font-size:.7rem;font-weight:600">Pick Image</span><button onclick="document.getElementById('imgPickModal').style.display='none'" style="background:none;border:none;color:var(--mu);cursor:pointer;font-size:1.1rem">×</button></div><div style="padding:.75rem;display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem">${SITE_IMGS.map(img=>`<div style="cursor:pointer;border:1px solid var(--bd);border-radius:2px;overflow:hidden" onclick="applyPickedImg('${img.src}')" onmouseover="this.style.borderColor='var(--ac)'" onmouseout="this.style.borderColor='var(--bd)'"><img src="${img.src}" style="width:100%;height:60px;object-fit:cover;display:block" onerror="this.parentElement.style.display='none'"><div style="padding:.25rem .35rem;font-family:'IBM Plex Mono',monospace;font-size:.46rem;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${img.label}</div></div>`).join('')}</div><div style="padding:.5rem .9rem;border-top:1px solid var(--bd)"><input id="imgPickUrl" type="url" placeholder="Or paste any URL…" style="width:100%;background:var(--sf2);border:1px solid var(--bd);color:#f4f1eb;font-size:.7rem;padding:.38rem .55rem;border-radius:2px;outline:none;margin-bottom:.4rem"><button onclick="applyPickedImg(document.getElementById('imgPickUrl').value)" style="width:100%;background:#f4f1eb;color:#0f0f11;border:none;font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;padding:.38rem;cursor:pointer;border-radius:2px;font-weight:600">Use This URL</button></div></div>`;
    document.body.appendChild(m);
  }
  m.style.display='flex';
}
window.applyPickedImg=function(src){
  if(!src||!_imgKey)return;
  document.getElementById('imgPickModal').style.display='none';
  const inp=document.querySelector(`[data-f="${_imgKey}"]`);
  if(inp){inp.value=src;inp.dispatchEvent(new Event('input',{bubbles:true}));}
  const prev=document.querySelector(`[data-preview="${_imgKey}"]`);
  if(prev){if(prev.tagName==='IMG'){prev.src=src;prev.style.display='block';}else{const img=document.createElement('img');img.dataset.preview=_imgKey;img.src=src;img.style.cssText='width:100%;height:72px;object-fit:cover;border:1px solid var(--bd);border-radius:2px;margin-bottom:.3rem;display:block';prev.replaceWith(img);}}
};

async function uploadImg(fieldKey){
  const input=document.createElement('input');input.type='file';input.accept='image/*';
  input.onchange=async function(){
    const file=input.files[0];if(!file)return;
    status('Uploading…');
    try{
      const sb=getSb();
      const path='builder/'+Date.now()+'.'+file.name.split('.').pop();
      const{data,error}=await sb.storage.from('images').upload(path,file,{upsert:true});
      if(error)throw error;
      const{data:{publicUrl}}=sb.storage.from('images').getPublicUrl(path);
      window.applyPickedImg(publicUrl);status('Uploaded ✓');toast('Image uploaded','ok');
    }catch(e){
      const url=URL.createObjectURL(file);
      window.applyPickedImg(url);
      status('Local preview only');toast('Upload failed — local preview only','err');
    }
  };input.click();
}

// ── LIBRARY ───────────────────────────────────────────────────────────────
function openLib(){
  const cats={store:'Store',marketing:'Marketing',layout:'Layout'};
  let html='';
  Object.entries(cats).forEach(([cat,catLabel])=>{
    const types=Object.entries(TYPES).filter(([,t])=>t.cat===cat);
    if(!types.length)return;
    html+=`<div class="sc-cat">${catLabel}</div>`;
    html+=types.map(([type,d])=>`<div class="sc" onclick="addSec('${type}')"><div class="sc-ico">${d.icon}</div><div class="sc-nm">${type.replace(/_/g,' ')}</div><div class="sc-ds">${d.desc}</div></div>`).join('');
  });
  document.getElementById('libGrid').innerHTML=html;
  document.getElementById('libModal').classList.add('open');
}
function closeLib(){document.getElementById('libModal').classList.remove('open');}

function addSec(type){
  closeLib();
  pushUndo();
  const id=type+'-'+Date.now();
  const maxOrd=Math.max(...sections.map(s=>s.order||0),-1);
  sections.push({id,type,label:type.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()),visible:true,order:maxOrd+1,settings:{...SECT_DEFAULTS[type]}});
  markDirty();renderSidebar();selectSec(id);schedSend();
  toast('Section added');
}

// ── PREVIEW ───────────────────────────────────────────────────────────────
function setPvMode(m){
  pvMode=m;
  document.querySelectorAll('#pvTog button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  document.getElementById('pvFrame').className='pv-frame '+m;
  document.getElementById('pvDims').textContent=m==='mob'?'390 × 820':'1280px wide';
}
function setTheme(t){
  pvTheme=t;
  document.querySelectorAll('#thTog button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  schedSend();
}

let _sendT;
function schedSend(){clearTimeout(_sendT);_sendT=setTimeout(sendCfg,400);}

function sendCfg(){
  try{
    localStorage.setItem('_zw_builder_cfg',JSON.stringify({sections,theme:pvTheme,_v:Date.now()+'-'+Math.random()}));
  }catch(e){showErr('localStorage failed: '+e.message);}
}

// ── UNDO ──────────────────────────────────────────────────────────────────
function pushUndo(){if(undoStack.length>20)undoStack.shift();undoStack.push(clone(sections));}
function undo(){
  if(!undoStack.length){toast('Nothing to undo');return;}
  sections=undoStack.pop();
  markDirty();
  if(selId&&!sections.find(s=>s.id===selId))closeEd();
  else if(selId){const s=sections.find(x=>x.id===selId);if(s)openEditor(s);}
  renderSidebar();sendCfg();
  toast('Undone');
}

// ── SAVE / PUBLISH ────────────────────────────────────────────────────────
async function saveDraft(auto=false){
  if(auto&&!dirty)return;
  status('Saving…');
  const dot=document.getElementById('autosaveDot');
  dot.classList.add('active');
  const ok=await saveToSupa(false);
  setTimeout(()=>dot.classList.remove('active'),2000);
  if(!auto&&ok)toast('Draft saved','ok');
}

async function publishPage(){
  status('Publishing…');
  const ok=await saveToSupa(true);
  if(ok)toast('Published! Changes are live.','ok');
}

async function saveToSupa(pub){
  try{
    const sb=getSb();if(!sb){showErr('No DB');return false;}
    const{data:{session}}=await sb.auth.getSession();
    if(!session){showErr('Session expired');return false;}
    const res=await fetch('/api/save-page-builder',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accessToken:session.access_token,sections,theme:pvTheme,published:pub})});
    if(!res.ok){const j=await res.json().catch(()=>({}));showErr((j.error||'Save failed'));return false;}
    dirty=false;lastSaved=clone(sections);
    status(pub?'Published ✓':'Draft saved');
    return true;
  }catch(e){showErr(e.message);return false;}
}

function revertChanges(){
  if(!dirty){toast('No changes to revert');return;}
  if(!confirm('Revert to last saved state?'))return;
  sections=clone(lastSaved||DEFAULT_SECTIONS);
  dirty=false;closeEd();renderSidebar();sendCfg();
  status('Reverted');toast('Reverted','ok');
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function clone(x){return JSON.parse(JSON.stringify(x));}
function markDirty(){dirty=true;status('Unsaved changes');}
function status(msg){document.getElementById('tstatus').innerHTML=`<span class="autosave-dot" id="autosaveDot"></span>${msg}`;}

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='on'+(type?' '+type:'');
  clearTimeout(_tt);_tt=setTimeout(()=>el.className='',2600);
}
function showErr(msg){
  document.getElementById('errMsg').textContent=msg;
  document.getElementById('errBox').classList.add('on');
}

window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue='';}});
</script>
