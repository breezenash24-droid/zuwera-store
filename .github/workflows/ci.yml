name: CI

# Gate every change before it can reach production (main).
# Cloudflare Pages builds from `main`, so a green check here == safe to merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Static checks + smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22        # 22 auto-detects ESM in .js (the Functions use import/export)

      # Deterministic install. `npm ci` runs postinstall (bump-cache-version),
      # which only rewrites ?v= hashes locally — harmless in CI.
      - name: Install dependencies
        run: npm ci

      - name: Repo audit (JS/HTML syntax, broken refs, /api endpoints)
        run: npm run audit:repo

      - name: Deployment checklist (wiring + checkout/cart smoke)
        run: npm run deployment-checklist

      - name: Static build sanity (produces dist/)
        run: npm run build

      # Non-blocking so a new advisory doesn't wall off unrelated changes;
      # review the report in the run logs. Flip to `--audit-level=high` to gate.
      - name: npm audit (advisory)
        run: npm audit --omit=dev || true

  secrets-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so gitleaks can scan past commits
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
