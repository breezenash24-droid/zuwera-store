   header shows Account instead of Login without a flash. */
(function(){try{

  for(_i=0;_i<localStorage.length;_i++){
    var _k=localStorage.key(_i);if(!_k)continue;
    var _m=_k.match(/^(?:zuwera-auth|sb-[a-z0-9-]+-auth-token)(?:\.(\d+))?$/);if(!_m)continue;
    if(_m[1]===undefined)_b=localStorage.getItem(_k);else _ck[_m[1]]=localStorage.getItem(_k);
  }
  var _ord=Object.keys(_ck).map(Number).sort(function(a,b){return a-b;});
  var _str=_ord.length?_ord.map(function(n){return _ck[n];}).join(""):_b;

    var _bb=_str.slice(7).replace(/-/g,"+").replace(/_/g,"/");
    _str=new TextDecoder().decode(Uint8Array.from(atob(_bb),function(c){return c.charCodeAt(0);}));
  }
  var _raw=_str?JSON.parse(_str):null;
  var _se=_raw&&_raw.currentSession?_raw.currentSession:_raw;
  if(_se&&_se.user&&(Number(_se.expires_at||0)*1000>Date.now()||_se.refresh_token))window.__zwSessionUser=_se.user;
}catch(_){}})()

<script>
/* Effective theme for this landing page: a per-page override (set by the builder
   Pages tab, cached per slug) wins over the global site theme. Never writes the
   global zw_theme_mode so other pages are unaffected. */
window.__zwLM=function(){try{var sp=new URLSearchParams(location.search);var tag=(sp.get('tag')||'').toLowerCase();var slug=tag?('tag:'+tag):((sp.get('page')||sp.get('gender')||'').toLowerCase());return (slug&&localStorage.getItem('zw_landing_theme_'+slug))||localStorage.getItem('zw_theme_mode')||'';}catch(_){return '';}};
</script>
<script>
/* THEME FLASH PREVENTION — runs before any CSS loads */
(function(){try{
  var m=window.__zwLM();
  var h=document.documentElement;
  if(m==='super-light'||m==='light'){
    var bg=m==='super-light'?'#FFFFFF':'#F0EEE9';
    h.style.background=bg;h.style.colorScheme='light';
    var st=document.createElement('style');
    st.textContent='body{background:'+bg+'!important}html::before{background:'+bg+'!important}';
    document.head.appendChild(st);
  }
  var f=localStorage.getItem('zw_fonts');
  if(f){f=JSON.parse(f);
    if(f.vars)Object.keys(f.vars).forEach(function(k){h.style.setProperty(k,f.vars[k])});
    if(f.urls)f.urls.forEach(function(u){var l=document.createElement('link');l.rel='stylesheet';l.href=u;document.head.appendChild(l)});
    if(f.css){var s=document.createElement('style');s.textContent=f.css;document.head.appendChild(s);}
  }
}catch(_){}})()</script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:#09090b; --white:#f4f1eb;
      --font-head:'Barlow Condensed',sans-serif;
      --font-body:'Barlow',sans-serif;
      --font-mono:'IBM Plex Mono',monospace;
      --fw:var(--font-head); --fb:var(--font-body); --fm:var(--font-mono);
      --border:rgba(244,241,235,0.1);
    }
    body { background:var(--black); color:var(--white); font-family:var(--font-body); font-weight:300; overflow-x:clip; }

    /* NAV — mirrors homepage so storefront-cohesion.css mega-menu + header-scroll apply */
    nav#nav{
      position:fixed; top:0; left:0; right:0; z-index:220;
      display:flex; justify-content:space-between; align-items:center;
      padding:0.5rem 2.5rem; background:#09090b; isolation:isolate;
      transition:background .35s,border-color .35s,padding .35s,top .45s ease;
      border-bottom:1px solid rgba(244,241,235,.07);
    }
    .nav-logo{ display:flex; align-items:center; text-decoration:none; }
    .nav-logo img{ height:36px; width:auto; display:block; transition:filter .35s; filter:none; }
    .nav-center{ position:absolute; left:0; right:0; margin:0 auto; width:fit-content; display:flex; align-items:center; gap:2.4rem; }
    .nav-link{ font-family:var(--fw,'Barlow Condensed',sans-serif); font-size:1.7rem; font-weight:900; font-style:normal; letter-spacing:.02em; text-transform:uppercase; line-height:1; color:#f4f1eb; opacity:.92; text-decoration:none; transition:color .2s,opacity .2s; background:none; border:none; cursor:pointer; display:inline-flex; align-items:center; padding:.6rem .7rem; margin:-.6rem 0; }
    .nav-link:hover{ color:var(--white); opacity:1; }
    .nav-right{ display:flex; align-items:center; gap:.4rem; }
    body.light-mode nav#nav{ background:#F0EEE9; }
    body.super-light-mode nav#nav{ background:#FFFFFF; }
    body.light-mode .nav-logo img{ filter:invert(1); }
    body.light-mode .nav-link{ color:#09090b; opacity:1; }
    body.light-mode .nav-link:hover{ color:#09090b; opacity:.65; }
    @media(max-width:900px){ .nav-center{ display:none; } }

    /* HERO */
    .lp-hero{
      min-height:62vh; display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-end;
      padding:9rem 2.5rem 3rem; position:relative; overflow:hidden;
      background:#0c0c0f;
    }
    .lp-hero::after{ content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(9,9,11,.15) 0%,rgba(9,9,11,.72) 100%); pointer-events:none; z-index:1; }
    .lp-hero-bg{ background-image:var(--lp-hero-img); background-size:var(--lp-hero-fit,cover); background-position:center; background-repeat:no-repeat; }
    .lp-hero > *{ position:relative; z-index:2; }
    /* Background media (image OR video) must sit behind the content. This rule is
       more specific than ".lp-hero > *" so it wins the z-index/position cascade. */
    .lp-hero > .lp-hero-bg{ position:absolute; inset:0; z-index:0; width:100%; height:100%; object-fit:cover; border:0; }
    .lp-hero-kicker{ font-family:var(--fm); font-size:.66rem; letter-spacing:.32em; text-transform:uppercase; opacity:.7; margin-bottom:.9rem; }
    .lp-hero-title{ font-family:var(--fw); font-weight:900; font-style:italic; text-transform:uppercase; letter-spacing:.02em; font-size:clamp(2.8rem,9vw,6rem); line-height:.92; }
    .lp-hero-sub{ font-family:var(--fb); font-size:1.05rem; opacity:.8; margin-top:1rem; max-width:40ch; line-height:1.55; }
    .lp-hero-cta{ display:inline-block; margin-top:1.6rem; padding:.85rem 2rem; background:var(--white); color:var(--black); font-family:var(--fm); font-size:.66rem; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; transition:opacity .2s; }
    .lp-hero-cta:hover{ opacity:.82; }
    /* Hero text color override (set per page in the builder) — beats the theme
       rules so text stays readable over any hero image. */
    .lp-hero--lighttext .lp-hero-kicker,.lp-hero--lighttext .lp-hero-title,.lp-hero--lighttext .lp-hero-sub{ color:#FFFFFF !important; }
    .lp-hero--lighttext .lp-hero-cta{ background:#FFFFFF !important; color:#09090b !important; }
    .lp-hero--darktext .lp-hero-kicker,.lp-hero--darktext .lp-hero-title,.lp-hero--darktext .lp-hero-sub{ color:#09090b !important; }
    .lp-hero--darktext .lp-hero-cta{ background:#09090b !important; color:#FFFFFF !important; }
    /* Mobile hero: taller & tighter, swap to the mobile image/fit if one is set,
       and lean the bottom gradient darker so the text stays readable on any crop. */
    @media (max-width:640px){
      .lp-hero{ min-height:74vh; padding:7rem 1.4rem 2.4rem; }
      .lp-hero::after{ background:linear-gradient(180deg,rgba(9,9,11,.04) 0%,rgba(9,9,11,.32) 46%,rgba(9,9,11,.84) 100%); }
      .lp-hero-bg{ background-image:var(--lp-hero-img-mob,var(--lp-hero-img)); background-size:var(--lp-hero-fit-mob,var(--lp-hero-fit,cover)); background-position:var(--lp-hero-pos-mob,center); }
      .lp-hero-sub{ font-size:.98rem; }
    }
    /* Tablet hero: optional tablet image/fit, falling back to the mobile image
       (then the desktop one) — the JS resolves the chain into these vars. */
    @media (min-width:641px) and (max-width:1024px){
      .lp-hero-bg{ background-image:var(--lp-hero-img-tab,var(--lp-hero-img)); background-size:var(--lp-hero-fit-tab,var(--lp-hero-fit,cover)); background-position:var(--lp-hero-pos-tab,center); }
    }

    /* SECTION HEADINGS */
    .lp-sec{ padding:4.5rem 2.5rem; max-width:1500px; margin:0 auto; }
    .lp-sec-head{ display:flex; align-items:baseline; justify-content:space-between; gap:1rem; margin-bottom:2rem; flex-wrap:wrap; }
    .lp-sec-head h2{ font-family:var(--fw); font-weight:900; font-style:italic; text-transform:uppercase; letter-spacing:.04em; font-size:clamp(1.5rem,3.4vw,2.3rem); }

    .lp-sec-head a:hover{ opacity:1; }

    /* SHOP BY CATEGORY TILES */
    .lp-cat-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1rem; }
    .lp-cat-tile{ position:relative; display:block; aspect-ratio:4/5; overflow:hidden; background:#161619; text-decoration:none; color:#fff; }
    .lp-cat-tile img{ width:100%; height:100%; object-fit:cover; transition:transform .5s ease; }
    .lp-cat-tile:hover img{ transform:scale(1.05); }
    .lp-cat-tile::after{ content:''; position:absolute; inset:0; background:linear-gradient(180deg,transparent 45%,rgba(0,0,0,.62) 100%); }
    .lp-cat-ph{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; opacity:.25; }
    .lp-cat-label{ position:absolute; left:1.1rem; bottom:1rem; z-index:2; font-family:var(--fw); font-weight:900; font-style:italic; text-transform:uppercase; letter-spacing:.03em; font-size:1.3rem; display:flex; align-items:center; gap:.5rem; }
    .lp-cat-label svg{ width:16px; height:16px; opacity:.8; transition:transform .25s; }
    .lp-cat-tile:hover .lp-cat-label svg{ transform:translateX(4px); }
    /* Mobile: a compact, swipeable category row — not a stack of full-screen
       posters. Simple to scan; swipe for more; tap to drill in. */
    @media (max-width:640px){
      .lp-sec{ padding:2.6rem 1.2rem; }
      .lp-cat-grid{ display:flex; grid-template-columns:none; gap:.6rem;
        overflow-x:auto; -webkit-overflow-scrolling:touch; scroll-snap-type:x proximity;
        margin:0 -1.2rem; padding:0 1.2rem .5rem; }
      .lp-cat-grid::-webkit-scrollbar{ display:none; }
      .lp-cat-tile{ flex:0 0 43%; aspect-ratio:1/1; scroll-snap-align:start; }
      .lp-cat-label{ left:.7rem; bottom:.7rem; font-size:1rem; }
      .lp-cat-label svg{ width:13px; height:13px; }
    }

    /* FEATURED PRODUCT CARDS */
    .lp-feat-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:1.4rem 1rem; }
    .lp-card{ text-decoration:none; color:inherit; display:block; }
    .lp-card-img{ position:relative; aspect-ratio:4/5; overflow:hidden; background:#161619; }
    .lp-card-img img{ width:100%; height:100%; object-fit:cover; transition:transform .5s ease; }
    .lp-card:hover .lp-card-img img{ transform:scale(1.04); }
    .lp-card-ph{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; opacity:.25; }
    .lp-card-badge{ position:absolute; top:.7rem; left:.7rem; font-family:var(--fm); font-size:.55rem; letter-spacing:.14em; text-transform:uppercase; background:rgba(9,9,11,.78); color:#fff; padding:.32rem .55rem; }
    .lp-card-name{ font-family:var(--fw); font-weight:900; font-style:italic; font-size:1.15rem; letter-spacing:.02em; line-height:1.05; text-transform:uppercase; margin:.7rem 0 .2rem; }
    .lp-card-cat{ font-family:var(--fm); font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; opacity:.68; margin:0 0 .22rem; }
    .lp-card-price{ font-family:var(--fw); font-weight:700; font-size:1.05rem; letter-spacing:.01em; margin-top:.1rem; opacity:1; }

    .lp-empty{ text-align:center; padding:4rem 1rem; opacity:.55; font-family:var(--fm); font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; }
    .lp-skel{ opacity:.35; }

    body.light-mode .lp-hero{ background:#e8e5de; }
    /* No bottom haze in light themes — the hero text is dark, so the gradient
       isn't needed for contrast and just veils a logo/graphic hero. */
    body.light-mode .lp-hero::after{ background:none; }
    body.light-mode .lp-hero-cta{ background:#09090b; color:#fff; }
    body.light-mode .lp-cat-tile,body.light-mode .lp-card-img{ background:#ddd9d0; }
    body.light-mode .lp-cat-label{ color:#fff; }

       also apply because super-light keeps the light-mode class). */
    body.super-light-mode .lp-hero{ background:#FFFFFF; }
    body.super-light-mode .lp-hero::after{ background:none; }
    body.super-light-mode .lp-cat-tile,body.super-light-mode .lp-card-img{ background:#f1f0ec; }

<script>
(function() {
  function applyThemeMode(mode) {
    var resolved = mode === 'dark' ? 'dark' : mode === 'super-light' ? 'super-light' : 'light';
    document.body.classList.toggle('light-mode', resolved !== 'dark');
    document.body.classList.toggle('super-light-mode', resolved === 'super-light');
    var color = resolved === 'dark' ? '#09090b' : resolved === 'super-light' ? '#FFFFFF' : '#F0EEE9';
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', color);
    document.documentElement.style.backgroundColor = color;
  }
  try { applyThemeMode(window.__zwLM() || 'dark'); } catch(_) { applyThemeMode('dark'); }
  window.__zwApplyAdminTheme = applyThemeMode;
  window.__zwSyncThemeColor = function() {
    var m = document.body.classList.contains('super-light-mode') ? 'super-light'
          : document.body.classList.contains('light-mode') ? 'light' : 'dark';
    applyThemeMode(m);
  };
})();
</script>
