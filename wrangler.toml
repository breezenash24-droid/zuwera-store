# Cloudflare Pages — wrangler configuration
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# Deploy via: npx wrangler pages deploy . --project-name=zuwera-store
# Set secrets: npx wrangler pages secret put SECRET_NAME --project-name=zuwera-store

name                   = "zuwera-store"
compatibility_date     = "2024-09-23"
pages_build_output_dir = "."

# ── mTLS Certificate Binding — Apple Pay Merchant Identity ───────────────────
#
# This gives the /api/apple-pay-validate Worker the Apple Merchant Identity
# Certificate so it can authenticate to Apple's servers via mutual TLS.
#
# SETUP STEPS:
#   1. Run:  ./scripts/setup-apple-pay-cert.sh
#   2. Upload the cert + key to Cloudflare via Dashboard or API:
#
#      curl -X POST \
#        "https://api.cloudflare.com/client/v4/accounts/YOUR_ACCOUNT_ID/mtls_certificates" \
#        -H "Authorization: Bearer YOUR_CF_API_TOKEN" \
#        -H "Content-Type: multipart/form-data" \
#        -F "certificate=@apple-pay-certs/apple-merchant-cert.pem" \
#        -F "private_key=@apple-pay-certs/apple-merchant.key" \
#        -F "name=zuwera-apple-pay-merchant"
#
#   3. Copy the returned certificate_id and replace the placeholder below
#   4. Deploy: npx wrangler pages deploy . --project-name=zuwera-store

[[mtls_certificates]]
binding        = "APPLE_PAY_CERT"
certificate_id = "REPLACE_WITH_YOUR_CF_CERTIFICATE_ID"

# ── Non-sensitive environment variables ──────────────────────────────────────
[vars]
APPLE_MERCHANT_ID  = "merchant.store.zuwera"
APPLE_DOMAIN_NAME  = "zuwera.store"
APPLE_DISPLAY_NAME = "Zuwera Sportswear"
SITE_URL           = "https://zuwera.store"

# ── Secrets — set via CLI (values are prompted, never stored here) ────────────
# npx wrangler pages secret put STRIPE_SECRET_KEY        --project-name=zuwera-store
# npx wrangler pages secret put STRIPE_WEBHOOK_SECRET    --project-name=zuwera-store
# npx wrangler pages secret put RESEND_API_KEY           --project-name=zuwera-store
# npx wrangler pages secret put RESEND_FROM_EMAIL        --project-name=zuwera-store
# npx wrangler pages secret put SHIPPO_API_KEY           --project-name=zuwera-store
# npx wrangler pages secret put SUPABASE_URL             --project-name=zuwera-store
# npx wrangler pages secret put SUPABASE_SERVICE_KEY     --project-name=zuwera-store
