<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZUWERA â Product</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#09090b;
  --paper:#f4f1eb;
  --warm:#e8e2d8;
  --dim:rgba(9,9,11,0.4);
  --line:rgba(9,9,11,0.1);
  --gold:#F891A5;
  --red:#c0392b;
  --fw:'Barlow Condensed', sans-serif;
  --fm:'IBM Plex Mono', monospace;
  --fb:'Barlow', sans-serif;
}
body.light-mode {
  --ink:#f4f1eb;
  --paper:#09090b;
  --warm:#1a1a1e;
  --dim:rgba(244,241,235,0.4);
  --line:rgba(244,241,235,0.1);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--ink);
  color:var(--paper);
  font-family:var(--fb);
  font-weight:300;
  min-height:100vh;
}
a { color:var(--paper); text-decoration:none; }

/* Back button */
.back-link {
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:20px 40px;
  font-family:var(--fm);
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  opacity:0.6;
  transition:opacity .3s;
}
.back-link:hover { opacity:1; }
.back-link svg { width:16px; height:16px; }

/* Main layout */
.product-page {
  max-width:1200px;
  margin:0 auto;
  padding:0 40px 80px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
  align-items:start;
}

/* Image gallery */
.gallery {
  position:sticky;
  top:20px;
}
.gallery-main {
  width:100%;
  aspect-ratio:3/4;
  background:var(--warm);
  border-radius:4px;
  overflow:hidden;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.gallery-main img {
  width:100%;
  height:100%;
  object-fit:cover;
  transition:opacity .4s;
}
.gallery-main .no-image {
  font-family:var(--fm);
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  opacity:0.4;
}
.gallery-nav {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:50%;
  color:#fff;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .3s;
  z-index:2;
}
.gallery-nav:hover {
  background:rgba(0,0,0,0.8);
  border-color:var(--gold);
}
.gallery-nav.prev { left:12px; }
.gallery-nav.next { right:12px; }
.gallery-nav.hidden { display:none; }

.gallery-counter {
  position:absolute;
  bottom:12px;
  right:12px;
  background:rgba(0,0,0,0.6);
  color:#fff;
  font-family:var(--fm);
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
  letter-spacing:1px;
}
.gallery-counter.hidden { display:none; }

.gallery-thumbs {
  display:flex;
  gap:8px;
  margin-top:12px;
  overflow-x:auto;
}
.gallery-thumbs img {
  width:64px;
  height:80px;
  object-fit:cover;
  border-radius:3px;
  cursor:pointer;
  opacity:0.5;
  transition:opacity .3s, border-color .3s;
  border:2px solid transparent;
}
.gallery-thumbs img.active {
  opacity:1;
  border-color:var(--gold);
}

/* Product info */
.product-info {
  padding-top:20px;
}
.product-info .badge {
  display:inline-block;
  font-family:var(--fm);
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  padding:6px 16px;
  border:1px solid var(--gold);
  color:var(--gold);
  border-radius:20px;
  margin-bottom:20px;
}
.product-info h1 {
  font-family:var(--fw);
  font-size:clamp(32px, 5vw, 52px);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:2px;
  line-height:1.1;
  margin-bottom:8px;
}
.product-info .subtitle {
  font-size:16px;
  opacity:0.6;
  margin-bottom:24px;
  font-weight:300;
}
.product-info .price-block {
  display:flex;
  align-items:baseline;
  gap:16px;
  margin-bottom:8px;
}
.product-info .price {
  font-family:var(--fw);
  font-size:32px;
  font-weight:600;
}
.product-info .msrp {
  font-size:16px;
  opacity:0.4;
  text-decoration:line-through;
}
.product-info .member-price {
  font-family:var(--fm);
  font-size:12px;
  color:var(--gold);
  margin-bottom:32px;
  letter-spacing:1px;
}

.divider {
  border:none;
  border-top:1px solid var(--line);
  margin:24px 0;
}

/* Detail sections */
.detail-section { margin-bottom:24px; }
.detail-section h3 {
  font-family:var(--fm);
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  opacity:0.5;
  margin-bottom:10px;
}
.detail-section p, .detail-section li {
  font-size:15px;
  line-height:1.7;
  opacity:0.85;
}
.detail-section ul {
  list-style:none;
  padding:0;
}
.detail-section ul li::before {
  content:'201400a0';
  opacity:0.3;
}

.detail-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.tag {
  display:inline-block;
  font-family:var(--fm);
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:4px 12px;
  border:1px solid var(--dim);
  border-radius:16px;
  margin:0 6px 6px 0;
  opacity:0.7;
}

/* Loading */
.loading-screen {
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:60vh;
  font-family:var(--fm);
  font-size:12px;
  letter-spacing:3px;
  text-transform:uppercase;
  opacity:0.4;
}

/* Mobile */
@media (max-width:768px) {
  .product-page {
    grid-template-columns:1fr;
    gap:32px;
    padding:0 20px 60px;
  }
  .gallery { position:static; }
  .back-link { padding:16px 20px; }
  .detail-grid { grid-template-columns:1fr; }
}
</style>
</head>

<a href="/" class="back-link">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  Back to Store
</a>

<div id="loading" class="loading-screen">Loading product...</div>

<div id="product-container" class="product-page" style="display:none;">
  <!-- Gallery -->
  <div class="gallery">
    <div class="gallery-main" id="gallery-main">
      <button class="gallery-nav prev hidden" id="prev-btn" onclick="changeImage(-1)">&#8249;</button>
      <img id="main-image" src="" alt="" style="display:none;">
      <div class="no-image" id="no-image">Image Coming Soon</div>
      <button class="gallery-nav next hidden" id="next-btn" onclick="changeImage(1)">&#8250;</button>
      <div class="gallery-counter hidden" id="gallery-counter">1 / 1</div>
    </div>
    <div class="gallery-thumbs" id="gallery-thumbs"></div>
  </div>

  <!-- Product Info -->
  <div class="product-info">
    <div class="badge" id="product-badge">COMING SOON</div>
    <h1 id="product-title"></h1>
    <p class="subtitle" id="product-subtitle"></p>
    <div class="price-block">
      <span class="price" id="product-price"></span>
      <span class="msrp" id="product-msrp"></span>
    </div>
    <p class="member-price" id="product-member-price"></p>

    <hr class="divider">

    <div id="details-container"></div>
  </div>
</div>
