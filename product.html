<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZUWERA — Product</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#09090b;
  --paper:#f4f1eb;
  --warm:#e8e2d8;
  --dim:rgba(9,9,11,0.4);
  --line:rgba(9,9,11,0.1);
  --gold:#F891A5;
  --red:#c0392b;
  --fw:'Barlow Condensed', sans-serif;
  --fm:'IBM Plex Mono', monospace;
  --fb:'Barlow', sans-serif;
}
body.light-mode {
  --ink:#f4f1eb;
  --paper:#09090b;
  --warm:#1a1a1e;
  --dim:rgba(244,241,235,0.4);
  --line:rgba(244,241,235,0.1);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--ink);
  color:var(--paper);
  font-family:var(--fb);
  font-weight:300;
  min-height:100vh;
}
a { color:var(--paper); text-decoration:none; }

/* Back button */
.back-link {
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:20px 40px;
  font-family:var(--fm);
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  opacity:0.6;
  transition:opacity .3s;
}
.back-link:hover { opacity:1; }
.back-link svg { width:16px; height:16px; }

/* Main layout */
.product-page {
  max-width:1200px;
  margin:0 auto;
  padding:0 40px 80px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
  align-items:start;
}

/* Image gallery */
.gallery {
  position:sticky;
  top:20px;
}
.gallery-main {
  width:100%;
  aspect-ratio:3/4;
  background:var(--warm);
  border-radius:4px;
  overflow:hidden;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.gallery-main img {
  width:100%;
  height:100%;
  object-fit:cover;
  transition:opacity .4s;
}
.gallery-main .no-image {
  font-family:var(--fm);
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  opacity:0.4;
}
.gallery-nav {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:50%;
  color:#fff;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .3s;
  z-index:2;
}
.gallery-nav:hover {
  background:rgba(0,0,0,0.8);
  border-color:var(--gold);
}
.gallery-nav.prev { left:12px; }
.gallery-nav.next { right:12px; }
.gallery-nav.hidden { display:none; }

.gallery-counter {
  position:absolute;
  bottom:12px;
  right:12px;
  background:rgba(0,0,0,0.6);
  color:#fff;
  font-family:var(--fm);
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
  letter-spacing:1px;
}
.gallery-counter.hidden { display:none; }

.gallery-thumbs {
  display:flex;
  gap:8px;
  margin-top:12px;
  overflow-x:auto;
}
.gallery-thumbs img {
  width:64px;
  height:80px;
  object-fit:cover;
  border-radius:3px;
  cursor:pointer;
  opacity:0.5;
  transition:opacity .3s, border-color .3s;
  border:2px solid transparent;
}
.gallery-thumbs img.active {
  opacity:1;
  border-color:var(--gold);
}

/* Product info */
.product-info {
  padding-top:20px;
}
.product-info .badge {
  display:inline-block;
  font-family:var(--fm);
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  padding:6px 16px;
  border:1px solid var(--gold);
  color:var(--gold);
  border-radius:20px;
  margin-bottom:20px;
}
.product-info h1 {
  font-family:var(--fw);
  font-size:clamp(32px, 5vw, 52px);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:2px;
  line-height:1.1;
  margin-bottom:8px;
}
.product-info .subtitle {
  font-size:16px;
  opacity:0.6;
  margin-bottom:24px;
  font-weight:300;
}
.product-info .price-block {
  display:flex;
  align-items:baseline;
  gap:16px;
  margin-bottom:8px;
}
.product-info .price {
  font-family:var(--fw);
  font-size:32px;
  font-weight:600;
}
.product-info .msrp {
  font-size:16px;
  opacity:0.4;
  text-decoration:line-through;
}
.product-info .member-price {
  font-family:var(--fm);
  font-size:12px;
  color:var(--gold);
  margin-bottom:32px;
  letter-spacing:1px;
}

.divider {
  border:none;
  border-top:1px solid var(--line);
  margin:24px 0;
}

/* Detail sections */
.detail-section { margin-bottom:24px; }
.detail-section h3 {
  font-family:var(--fm);
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  opacity:0.5;
  margin-bottom:10px;
}
.detail-section p, .detail-section li {
  font-size:15px;
  line-height:1.7;
  opacity:0.85;
}
.detail-section ul {
  list-style:none;
  padding:0;
}
.detail-section ul li::before {
  content:'\2014\00a0';
  opacity:0.3;
}

.detail-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.tag {
  display:inline-block;
  font-family:var(--fm);
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:4px 12px;
  border:1px solid var(--dim);
  border-radius:16px;
  margin:0 6px 6px 0;
  opacity:0.7;
}

/* Loading */
.loading-screen {
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:60vh;
  font-family:var(--fm);
  font-size:12px;
  letter-spacing:3px;
  text-transform:uppercase;
  opacity:0.4;
}

/* Mobile */
@media (max-width:768px) {
  .product-page {
    grid-template-columns:1fr;
    gap:32px;
    padding:0 20px 60px;
  }
  .gallery { position:static; }
  .back-link { padding:16px 20px; }
  .detail-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<a href="/" class="back-link">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  Back to Store
</a>

<div id="loading" class="loading-screen">Loading product...</div>

<div id="product-container" class="product-page" style="display:none;">
  <!-- Gallery -->
  <div class="gallery">
    <div class="gallery-main" id="gallery-main">
      <button class="gallery-nav prev hidden" id="prev-btn" onclick="changeImage(-1)">&#8249;</button>
      <img id="main-image" src="" alt="" style="display:none;">
      <div class="no-image" id="no-image">Image Coming Soon</div>
      <button class="gallery-nav next hidden" id="next-btn" onclick="changeImage(1)">&#8250;</button>
      <div class="gallery-counter hidden" id="gallery-counter">1 / 1</div>
    </div>
    <div class="gallery-thumbs" id="gallery-thumbs"></div>
  </div>

  <!-- Product Info -->
  <div class="product-info">
    <div class="badge" id="product-badge">COMING SOON</div>
    <h1 id="product-title"></h1>
    <p class="subtitle" id="product-subtitle"></p>
    <div class="price-block">
      <span class="price" id="product-price"></span>
      <span class="msrp" id="product-msrp"></span>
    </div>
    <p class="member-price" id="product-member-price"></p>

    <hr class="divider">

    <div id="details-container"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
  var SUPA_URL = 'https://daloloaymmkfqywbbrwh.supabase.co';
  var SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhbG9sb2F5bW1rZnF5d2JicndoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI0MjA3MjgsImV4cCI6MjA1Nzk5NjcyOH0.IVxMFMngNy5V_W_BKaaHgxGMIVFxTnuOBQ6FgSCVi8o';
  var _sb = supabase.createClient(SUPA_URL, SUPA_ANON, {
    auth: { autoRefreshToken: false, persistSession: false, detectSessionInUrl: false }
  });

  var images = [];
  var currentIndex = 0;

  // Load theme
  _sb.from('site_settings').select('value').eq('key', 'theme').single().then(function(res) {
    if (res.data && res.data.value && res.data.value.mode === 'light') {
      document.body.classList.add('light-mode');
    }
  });

  // Get product ID from URL
  var params = new URLSearchParams(window.location.search);
  var productId = params.get('id');

  if (!productId) {
    document.getElementById('loading').textContent = 'Product not found.';
    return;
  }

  // Fetch product
  _sb.from('products').select('*').eq('id', productId).single().then(function(res) {
    if (res.error || !res.data) {
      document.getElementById('loading').textContent = 'Product not found.';
      return;
    }
    var p = res.data;
    document.title = 'ZUWERA \u2014 ' + (p.title || 'Product');

    // Parse images
    if (p.image_url) {
      try {
        if (p.image_url.startsWith('[')) {
          images = JSON.parse(p.image_url);
        } else {
          images = [p.image_url];
        }
      } catch(e) {
        images = [p.image_url];
      }
    }

    // Setup gallery
    if (images.length > 0) {
      document.getElementById('no-image').style.display = 'none';
      var mainImg = document.getElementById('main-image');
      mainImg.src = images[0];
      mainImg.alt = p.title || '';
      mainImg.style.display = 'block';

      if (images.length > 1) {
        document.getElementById('next-btn').classList.remove('hidden');
        document.getElementById('gallery-counter').classList.remove('hidden');
        updateCounter();

        // Thumbnails
        var thumbsEl = document.getElementById('gallery-thumbs');
        images.forEach(function(url, i) {
          var thumb = document.createElement('img');
          thumb.src = url;
          thumb.alt = 'Image ' + (i + 1);
          if (i === 0) thumb.classList.add('active');
          thumb.onclick = function() { goToImage(i); };
          thumbsEl.appendChild(thumb);
        });
      }
    }

    // Badge
    var badgeEl = document.getElementById('product-badge');
    if (p.status === 'live') {
      badgeEl.textContent = 'SHOP NOW';
    } else {
      badgeEl.textContent = 'COMING SOON';
    }

    // Title & subtitle
    document.getElementById('product-title').textContent = p.title || '';
    document.getElementById('product-subtitle').textContent = p.subtitle || '';

    // Prices
    var priceEl = document.getElementById('product-price');
    var msrpEl = document.getElementById('product-msrp');
    var memberEl = document.getElementById('product-member-price');

    if (p.current_price) {
      priceEl.textContent = '$' + Number(p.current_price).toFixed(2);
    }
    if (p.msrp && p.current_price && Number(p.msrp) > Number(p.current_price)) {
      msrpEl.textContent = '$' + Number(p.msrp).toFixed(2);
    }
    if (p.member_price) {
      memberEl.textContent = 'Member Price: $' + Number(p.member_price).toFixed(2);
    }

    // Build detail sections
    var detailsHtml = '';

    // Details grid
    var gridItems = [];
    if (p.sku) gridItems.push({label:'SKU', val:p.sku});
    if (p.gender) gridItems.push({label:'Gender', val:p.gender});
    if (p.colorway) gridItems.push({label:'Colorway', val:p.colorway});
    if (p.material_composition) gridItems.push({label:'Material', val:p.material_composition});
    if (p.model_height) gridItems.push({label:'Model Height', val:p.model_height});
    if (p.model_size_worn) gridItems.push({label:'Model Size', val:p.model_size_worn});

    if (gridItems.length > 0) {
      detailsHtml += '<div class="detail-grid">';
      gridItems.forEach(function(item) {
        detailsHtml += '<div class="detail-section"><h3>' + item.label + '</h3><p>' + item.val + '</p></div>';
      });
      detailsHtml += '</div><hr class="divider">';
    }

    // Measurements
    var measurements = [];
    if (p.pom_chest) measurements.push('Chest: ' + p.pom_chest);
    if (p.pom_waist) measurements.push('Waist: ' + p.pom_waist);
    if (p.pom_hips) measurements.push('Hips: ' + p.pom_hips);
    if (p.pom_inseam) measurements.push('Inseam: ' + p.pom_inseam);
    if (p.pom_length) measurements.push('Length: ' + p.pom_length);

    if (measurements.length > 0) {
      detailsHtml += '<div class="detail-section"><h3>Measurements</h3><ul>';
      measurements.forEach(function(m) { detailsHtml += '<li>' + m + '</li>'; });
      detailsHtml += '</ul></div><hr class="divider">';
    }

    // Performance
    if (p.breathability_mvtr) {
      detailsHtml += '<div class="detail-section"><h3>Breathability (MVTR)</h3><p>' + p.breathability_mvtr + '</p></div><hr class="divider">';
    }

    // Tags
    var tags = [];
    if (p.sustainability_tags) {
      var st = p.sustainability_tags;
      if (typeof st === 'string') { try { st = JSON.parse(st); } catch(e) { st = [st]; } }
      if (Array.isArray(st)) tags = tags.concat(st);
    }
    if (p.certifications) {
      var ct = p.certifications;
      if (typeof ct === 'string') { try { ct = JSON.parse(ct); } catch(e) { ct = [ct]; } }
      if (Array.isArray(ct)) tags = tags.concat(ct);
    }
    if (tags.length > 0) {
      detailsHtml += '<div class="detail-section"><h3>Tags & Certifications</h3><div>';
      tags.forEach(function(t) { detailsHtml += '<span class="tag">' + t + '</span>'; });
      detailsHtml += '</div></div>';
    }

    document.getElementById('details-container').innerHTML = detailsHtml;

    // Show product, hide loading
    document.getElementById('loading').style.display = 'none';
    document.getElementById('product-container').style.display = 'grid';
  });

  // Gallery navigation functions
  window.changeImage = function(dir) {
    currentIndex += dir;
    if (currentIndex < 0) currentIndex = 0;
    if (currentIndex >= images.length) currentIndex = images.length - 1;
    updateGallery();
  };

  window.goToImage = function(i) {
    currentIndex = i;
    updateGallery();
  };

  function updateGallery() {
    document.getElementById('main-image').src = images[currentIndex];

    // Nav buttons
    document.getElementById('prev-btn').classList.toggle('hidden', currentIndex === 0);
    document.getElementById('next-btn').classList.toggle('hidden', currentIndex === images.length - 1);

    // Counter
    updateCounter();

    // Thumbs
    var thumbs = document.querySelectorAll('.gallery-thumbs img');
    thumbs.forEach(function(t, i) {
      t.classList.toggle('active', i === currentIndex);
    });
  }

  function updateCounter() {
    document.getElementById('gallery-counter').textContent = (currentIndex + 1) + ' / ' + images.length;
  }
})();
</script>
</body>
</html>
